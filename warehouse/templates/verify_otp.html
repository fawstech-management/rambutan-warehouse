<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .otp-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .otp-container h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .otp-container label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .otp-container input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .otp-container button {
            padding: 10px 20px;
            background-color: #28a745;
            border: none;
            color: #fff;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .otp-container button:hover {
            background-color: #218838;
        }

        .message {
            color: red;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <h1>Email Verification</h1>

        <form method="POST">
            {% csrf_token %}
            <label for="otp">Enter the OTP sent to your email:</label>
            <input type="text" id="otp" name="otp" placeholder="Enter OTP" required>
            <button type="submit">Verify</button>

            {% if messages %}
                {% for message in messages %}
                    <p class="message {% if 'success' in message.tags %}success{% endif %}">{{ message }}</p>
                {% endfor %}
            {% endif %}

            {% if error %}
                <p class="message">{{ error }}</p>
            {% endif %}
        </form>
    </div>
</body>
</html>
